name: Meru Enterprise CI/CD

on:
  push:
    branches: [main, develop, staging, 'feature/*']
  pull_request:
    branches: [main, develop, staging]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy (dev/staging/prod)'
        required: true
        default: 'staging'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  NODE_VERSION: '18'
  PNPM_VERSION: '8'
  AWS_REGION: 'ap-south-1'

jobs:
  # ========================================
  # BUILD & TEST
  # ========================================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm run lint

      - name: Run type check
        run: pnpm run build

      - name: Run unit tests
        run: pnpm run test:cov
        env:
          NODE_ENV: test
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USERNAME: postgres
          DATABASE_PASSWORD: postgres
          DATABASE_NAME: meru_test
          JWT_SECRET: test-jwt-secret
          OPENAI_API_KEY: test-key

      - name: Build Docker images
        run: |
          docker build -t meru-core:${{ github.sha }} .
          docker tag meru-core:${{ github.sha }} meru-core:latest

      - name: Run security scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: 'meru-core:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ========================================
  # DEPLOY TO ALL 3 EC2s (DEV)
  # ========================================
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    needs: build-and-test
    environment:
      name: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Meru Core EC2 (Dev)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.MERU_EC2_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/meru-core
            git fetch origin
            git pull origin develop

            # Rebuild and restart dev container only
            docker-compose -f docker-compose.meru.yml up -d --build meru-dev
            docker-compose -f docker-compose.meru.yml restart meru-dev

            echo "Meru Core dev deployment completed"

      - name: Deploy to Immigration EC2 (Dev)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.IMMIGRATION_EC2_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/meru-core
            git fetch origin
            git pull origin develop

            # Rebuild and restart dev container only
            docker-compose -f docker-compose.immigration.yml up -d --build immigration-dev
            docker-compose -f docker-compose.immigration.yml restart immigration-dev

            echo "Immigration dev deployment completed"

      - name: Deploy to GRC EC2 (Dev)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.GRC_EC2_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/meru-core
            git fetch origin
            git pull origin develop

            # Rebuild and restart dev container only
            docker-compose -f docker-compose.grc.yml up -d --build grc-dev
            docker-compose -f docker-compose.grc.yml restart grc-dev

            echo "GRC dev deployment completed"

      - name: Health check (Dev)
        run: |
          sleep 15
          for url in "https://dev-api.meru.com" "https://dev-api.immistack.com" "https://dev-api.governancex.com"; do
            response=$(curl -s -o /dev/null -w "%{http_code}" ${url}/api/v1/health || echo "000")
            if [ $response -eq 200 ]; then
              echo "✅ ${url} is healthy"
            else
              echo "❌ ${url} failed (status: $response)"
            fi
          done

  # ========================================
  # DEPLOY TO ALL 3 EC2s (STAGING)
  # ========================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging'
    needs: build-and-test
    environment:
      name: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Meru Core EC2 (Staging)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.MERU_EC2_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/meru-core
            git fetch origin
            git pull origin staging

            # Rebuild and restart staging container only
            docker-compose -f docker-compose.meru.yml up -d --build meru-staging
            docker-compose -f docker-compose.meru.yml restart meru-staging

            echo "Meru Core staging deployment completed"

      - name: Deploy to Immigration EC2 (Staging)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.IMMIGRATION_EC2_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/meru-core
            git fetch origin
            git pull origin staging

            # Rebuild and restart staging container only
            docker-compose -f docker-compose.immigration.yml up -d --build immigration-staging
            docker-compose -f docker-compose.immigration.yml restart immigration-staging

            echo "Immigration staging deployment completed"

      - name: Deploy to GRC EC2 (Staging)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.GRC_EC2_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/meru-core
            git fetch origin
            git pull origin staging

            # Rebuild and restart staging container only
            docker-compose -f docker-compose.grc.yml up -d --build grc-staging
            docker-compose -f docker-compose.grc.yml restart grc-staging

            echo "GRC staging deployment completed"

      - name: Health check (Staging)
        run: |
          sleep 15
          for url in "https://staging-api.meru.com" "https://staging-api.immistack.com" "https://staging-api.governancex.com"; do
            response=$(curl -s -o /dev/null -w "%{http_code}" ${url}/api/v1/health || echo "000")
            if [ $response -eq 200 ]; then
              echo "✅ ${url} is healthy"
            else
              echo "❌ ${url} failed (status: $response)"
            fi
          done

  # ========================================
  # DEPLOY TO ALL 3 EC2s (PRODUCTION)
  # ========================================
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: build-and-test
    environment:
      name: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Meru Core EC2 (Production)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.MERU_EC2_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/meru-core
            git fetch origin
            git pull origin main

            # Rebuild and restart production container only
            docker-compose -f docker-compose.meru.yml up -d --build meru-prod
            docker-compose -f docker-compose.meru.yml restart meru-prod

            echo "Meru Core production deployment completed"

      - name: Deploy to Immigration EC2 (Production)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.IMMIGRATION_EC2_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/meru-core
            git fetch origin
            git pull origin main

            # Rebuild and restart production container only
            docker-compose -f docker-compose.immigration.yml up -d --build immigration-prod
            docker-compose -f docker-compose.immigration.yml restart immigration-prod

            echo "Immigration production deployment completed"

      - name: Deploy to GRC EC2 (Production)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.GRC_EC2_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/meru-core
            git fetch origin
            git pull origin main

            # Rebuild and restart production container only
            docker-compose -f docker-compose.grc.yml up -d --build grc-prod
            docker-compose -f docker-compose.grc.yml restart grc-prod

            echo "GRC production deployment completed"

      - name: Health check (Production)
        run: |
          sleep 15
          for url in "https://api.meru.com" "https://api.immistack.com" "https://api.governancex.com"; do
            response=$(curl -s -o /dev/null -w "%{http_code}" ${url}/api/v1/health || echo "000")
            if [ $response -eq 200 ]; then
              echo "✅ ${url} is healthy"
            else
              echo "❌ ${url} failed (status: $response)"
              exit 1
            fi
          done

      - name: Monitor for 1 minute (Production)
        run: |
          echo "Monitoring all production endpoints for 60 seconds..."
          for i in {1..12}; do
            all_healthy=true
            for url in "https://api.meru.com" "https://api.immistack.com" "https://api.governancex.com"; do
              response=$(curl -s -o /dev/null -w "%{http_code}" ${url}/api/v1/health || echo "000")
              if [ $response -ne 200 ]; then
                all_healthy=false
                echo "❌ ${url} unhealthy at check $i/12"
              fi
            done
            if [ "$all_healthy" = true ]; then
              echo "✅ All endpoints healthy (check $i/12)"
            else
              echo "⚠️  Some endpoints unhealthy (check $i/12)"
            fi
            sleep 5
          done

      - name: Notify team of successful deployment
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: '✅ Production deployment successful! All 3 verticals healthy.'
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify team of failed deployment
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: '❌ Production deployment failed! Check logs immediately.'
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ========================================
  # MANUAL DEPLOY (WORKFLOW DISPATCH)
  # ========================================
  manual-deploy:
    name: Manual Deploy (${{ github.event.inputs.environment }})
    runs-on: ubuntu-latest
    needs: build-and-test
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to All EC2s (${{ github.event.inputs.environment }})
        env:
          ENV: ${{ github.event.inputs.environment }}
        run: |
          echo "Deploying $ENV to all 3 EC2s..."
          
          # Deploy to Meru Core
          curl -sSL https://raw.githubusercontent.com/appleboy/ssh-action/master/entrypoint.sh | bash -s -- \
            --host ${{ secrets.MERU_EC2_HOST }} \
            --username ${{ secrets.EC2_SSH_USER }} \
            --key ${{ secrets.EC2_SSH_PRIVATE_KEY }} \
            --script "cd /var/www/meru-core && git pull && docker-compose -f docker-compose.meru.yml up -d --build meru-$ENV && docker-compose -f docker-compose.meru.yml restart meru-$ENV"

          # Deploy to Immigration
          curl -sSL https://raw.githubusercontent.com/appleboy/ssh-action/master/entrypoint.sh | bash -s -- \
            --host ${{ secrets.IMMIGRATION_EC2_HOST }} \
            --username ${{ secrets.EC2_SSH_USER }} \
            --key ${{ secrets.EC2_SSH_PRIVATE_KEY }} \
            --script "cd /var/www/meru-core && git pull && docker-compose -f docker-compose.immigration.yml up -d --build immigration-$ENV && docker-compose -f docker-compose.immigration.yml restart immigration-$ENV"

          # Deploy to GRC
          curl -sSL https://raw.githubusercontent.com/appleboy/ssh-action/master/entrypoint.sh | bash -s -- \
            --host ${{ secrets.GRC_EC2_HOST }} \
            --username ${{ secrets.EC2_SSH_USER }} \
            --key ${{ secrets.EC2_SSH_PRIVATE_KEY }} \
            --script "cd /var/www/meru-core && git pull && docker-compose -f docker-compose.grc.yml up -d --build grc-$ENV && docker-compose -f docker-compose.grc.yml restart grc-$ENV"

          echo "Deployment to $ENV completed!"
