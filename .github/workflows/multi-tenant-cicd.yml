name: Multi-Tenant CI/CD Pipeline

on:
  push:
    branches: [ main, develop, staging, 'feature/*' ]
  pull_request:
    branches: [ main, develop, staging ]
  workflow_dispatch:

env:
  NODE_VERSION: '18'
  PNPM_VERSION: '8'
  AWS_REGION: 'ap-south-1'

jobs:
  # ========================================
  # BUILD & TEST (All Environments)
  # ========================================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm run lint

      - name: Run type check
        run: pnpm run build

      - name: Run unit tests
        run: pnpm run test:cov
        env:
          NODE_ENV: test
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USERNAME: postgres
          DATABASE_PASSWORD: postgres
          DATABASE_NAME: meru_test
          JWT_SECRET: test-jwt-secret
          OPENAI_API_KEY: test-key

      - name: Run security scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: meru-core:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ========================================
  # DEPLOY TO DEVELOPMENT
  # ========================================
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    needs: build-and-test
    environment:
      name: development
      url: https://dev.meru.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.DEV_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.DEV_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run database migrations (Dev RDS)
        run: pnpm run migration:run
        env:
          DATABASE_HOST: ${{ secrets.DEV_RDS_HOST }}
          DATABASE_PORT: ${{ secrets.DEV_RDS_PORT }}
          DATABASE_USERNAME: ${{ secrets.DEV_RDS_USERNAME }}
          DATABASE_PASSWORD: ${{ secrets.DEV_RDS_PASSWORD }}
          DATABASE_NAME: ${{ secrets.DEV_RDS_DATABASE }}

      - name: Deploy to EC2 (Dev)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEV_EC2_HOST }}
          username: ${{ secrets.DEV_SSH_USER }}
          key: ${{ secrets.DEV_SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/meru-dev
            git fetch origin
            git pull origin develop

            pnpm install --frozen-lockfile
            pnpm run build

            # Backup current running instance
            if pm2 list | grep -q meru-dev; then
              pm2 save
            fi

            # Start/Restart application
            pm2 restart meru-dev || pm2 start dist/main.js --name meru-dev

            # Run RLS context setup (if needed)
            echo "Development deployment completed at $(date)"

      - name: Health check (Dev)
        run: |
          sleep 10
          response=$(curl -s -o /dev/null -w "%{http_code}" https://dev.meru.com/api/v1/health || echo "000")
          if [ $response -eq 200 ]; then
            echo "✅ Development deployment successful!"
          else
            echo "❌ Health check failed with status code: $response"
            exit 1
          fi

  # ========================================
  # DEPLOY TO STAGING
  # ========================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging'
    needs: build-and-test
    environment:
      name: staging
      url: https://staging.meru.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.STAGING_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.STAGING_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run database migrations (Staging RDS)
        run: pnpm run migration:run
        env:
          DATABASE_HOST: ${{ secrets.STAGING_RDS_HOST }}
          DATABASE_PORT: ${{ secrets.STAGING_RDS_PORT }}
          DATABASE_USERNAME: ${{ secrets.STAGING_RDS_USERNAME }}
          DATABASE_PASSWORD: ${{ secrets.STAGING_RDS_PASSWORD }}
          DATABASE_NAME: ${{ secrets.STAGING_RDS_DATABASE }}

      - name: Backup current deployment
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_EC2_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          script: |
            cd /var/www
            cp -r meru-staging meru-staging-backup-$(date +%Y%m%d-%H%M%S) || true

      - name: Deploy to EC2 (Staging)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_EC2_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/meru-staging
            git fetch origin
            git pull origin staging

            pnpm install --frozen-lockfile
            pnpm run build

            pm2 restart meru-staging || pm2 start dist/main.js --name meru-staging

            echo "Staging deployment completed at $(date)"

      - name: Health check (Staging)
        run: |
          sleep 10
          response=$(curl -s -o /dev/null -w "%{http_code}" https://staging.meru.com/api/v1/health || echo "000")
          if [ $response -eq 200 ]; then
            echo "✅ Staging deployment successful!"
          else
            echo "❌ Health check failed with status code: $response"
            exit 1
          fi

      - name: Run smoke tests (Staging)
        run: |
          echo "Running smoke tests on staging..."
          # Add your smoke tests here
          # Example: curl -X POST https://staging.meru.com/api/v1/tenants/check-slug -H "Content-Type: application/json" -d '{"slug": "test-smoke"}'

  # ========================================
  # DEPLOY TO PRODUCTION
  # ========================================
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: build-and-test
    environment:
      name: production
      url: https://meru.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.PROD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.PROD_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create RDS snapshot (before migration)
        uses: ./.github/actions/rds-snapshot
        with:
          db-instance-id: meru-core-prod
          snapshot-prefix: pre-deploy

      - name: Run database migrations (Production RDS)
        run: pnpm run migration:run
        env:
          DATABASE_HOST: ${{ secrets.PROD_RDS_HOST }}
          DATABASE_PORT: ${{ secrets.PROD_RDS_PORT }}
          DATABASE_USERNAME: ${{ secrets.PROD_RDS_USERNAME }}
          DATABASE_PASSWORD: ${{ secrets.PROD_RDS_PASSWORD }}
          DATABASE_NAME: ${{ secrets.PROD_RDS_DATABASE }}

      - name: Create database backup
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_EC2_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          script: |
            cd /var/www
            mkdir -p backups
            cp -r meru-core backups/meru-core-backup-$(date +%Y%m%d-%H%M%S) || true

      - name: Deploy to EC2 (Production)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_EC2_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/meru-core
            git fetch origin
            git pull origin main

            pnpm install --frozen-lockfile
            pnpm run build

            # Zero-downtime deployment with PM2 cluster mode
            pm2 reload meru-core || pm2 start dist/main.js --name meru-core --instances max --max-memory-restart 1G

            echo "Production deployment completed at $(date)"

      - name: Health check (Production)
        run: |
          sleep 15
          response=$(curl -s -o /dev/null -w "%{http_code}" https://meru.com/api/v1/health || echo "000")
          if [ $response -eq 200 ]; then
            echo "✅ Production deployment successful!"
          else
            echo "❌ Health check failed with status code: $response"
            echo "⚠️  Rolling back deployment..."
            exit 1
          fi

      - name: Monitor application health (Production)
        run: |
          echo "Monitoring application health for 60 seconds..."
          for i in {1..12}; do
            response=$(curl -s -o /dev/null -w "%{http_code}" https://meru.com/api/v1/health || echo "000")
            if [ $response -ne 200 ]; then
              echo "❌ Health check failed at attempt $i/12"
              exit 1
            fi
            echo "✅ Health check passed ($i/12)"
            sleep 5
          done
          echo "✅ All health checks passed!"

      - name: Notify team of successful deployment
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: '✅ Production deployment successful!'
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify team of failed deployment
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: '❌ Production deployment failed! Check logs immediately.'
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
