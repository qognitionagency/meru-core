version: '3.8'

services:
  # PostgreSQL Database (AWS RDS in production)
  postgres:
    image: postgres:15-alpine
    container_name: meru-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meru_core
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - meru-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (Optional - for caching)
  redis:
    image: redis:7-alpine
    container_name: meru-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - meru-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Meru Core API
  meru-core:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meru-core-dev
    environment:
      NODE_ENV: development
      PORT: 3000
      VERTICAL: core
      AWS_REGION: ap-south-1
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: meru_core
      JWT_SECRET: dev-jwt-secret-change-in-production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET: meru-documents
      DOCUMENT_ENCRYPTION_KEY: dev-encryption-key-32-chars-long!
      MAX_FILE_SIZE: 52428800
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - meru-network
    volumes:
      - ./src:/app/src
      - ./dist:/app/dist
    command: npm run start:dev

volumes:
  postgres_data:
  redis_data:

networks:
  meru-network:
    driver: bridge
